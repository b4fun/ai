name: Release binaries

on:
  release:
    types:
      - created
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            asset_name: ai-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            asset_name: ai-linux-arm64
          - os: macos-14
            platform: darwin
            arch: arm64
            asset_name: ai-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve build version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            case "$RELEASE_TAG" in
              v[0-9]*) version="${RELEASE_TAG#v}" ;;
              *) echo "Release tag must use the vX.Y.Z format: $RELEASE_TAG" >&2; exit 1 ;;
            esac
          else
            version="$(node -p "require('./package.json').version")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build SEA binary
        env:
          B4FUN_AI_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build:sea

      - name: Smoke test SEA binary
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${{ steps.version.outputs.version }}"
          actual_version="$(dist/sea/ai --version)"
          test "$actual_version" = "$expected_version"
          dist/sea/ai shell init bash --name ai >/dev/null

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release/package
          cp dist/sea/ai dist/release/package/ai
          chmod 755 dist/release/package/ai
          tar -czf "dist/release/${{ matrix.asset_name }}.tar.gz" -C dist/release/package ai
          (cd dist/release && shasum -a 256 "${{ matrix.asset_name }}.tar.gz" > "${{ matrix.asset_name }}.tar.gz.sha256")

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/${{ matrix.asset_name }}.tar.gz
            dist/release/${{ matrix.asset_name }}.tar.gz.sha256
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
