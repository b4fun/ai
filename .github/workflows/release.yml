name: Release binaries

on:
  release:
    types:
      - created
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            asset_name: ai-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            asset_name: ai-linux-arm64
          - os: macos-14
            platform: darwin
            arch: arm64
            asset_name: ai-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA binary
        run: npm run build:sea

      - name: Smoke test SEA binary
        shell: bash
        run: |
          set -euo pipefail
          expected_version="$(node -p "require('./package.json').version")"
          actual_version="$(dist/sea/ai --version)"
          test "$actual_version" = "$expected_version"
          dist/sea/ai shell init bash --name ai >/dev/null

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release/package
          cp dist/sea/ai dist/release/package/ai
          chmod 755 dist/release/package/ai
          tar -czf "dist/release/${{ matrix.asset_name }}.tar.gz" -C dist/release/package ai
          (cd dist/release && shasum -a 256 "${{ matrix.asset_name }}.tar.gz" > "${{ matrix.asset_name }}.tar.gz.sha256")

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/${{ matrix.asset_name }}.tar.gz
            dist/release/${{ matrix.asset_name }}.tar.gz.sha256
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
